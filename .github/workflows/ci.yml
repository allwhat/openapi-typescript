name: ci

on:
  push:
    branches:
      - main
      - "renovate/**"
  pull_request:
  workflow_dispatch:
    inputs:
      runner:
        description: Runner pool for manual install checks.
        required: true
        type: choice
        default: local
        options:
          - local
          - github-hosted

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package-install:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.runner == 'local' }}
    runs-on: [self-hosted, Linux, ARM64, packagemaze-linux-local]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: latest
          package-manager-cache: false
      - uses: pnpm/action-setup@v5
        with:
          run_install: true

  package-install-github-hosted:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'github-hosted' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: latest
          package-manager-cache: false
      - uses: pnpm/action-setup@v5
        with:
          run_install: true
