name: release

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  attestations: write
  contents: write
  pull-requests: write

env:
  PACKAGE_MAZE_FEED: packagemaze/npm-smoke-test
  PACKAGE_MAZE_REGISTRY_URL: https://pkg.packagemaze.com/packagemaze/npm-smoke-test

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Git setup
        uses: actions/checkout@v6

      - name: Node setup
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: pnpm setup
        uses: pnpm/action-setup@v5
        with:
          run_install: true

      # Do not remove! This ensures a build happens every time
      - name: Build all packages
        run: pnpm run build

      - name: Changesets version and/or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm exec changeset publish
          commit: "[ci] release"
          title: "[ci] release"
        env:
          GITHUB_TOKEN: ${{ secrets.OPENAPI_TS_BOT_GITHUB_TOKEN }}

      - name: Check PackageMaze package release
        if: steps.changesets.outputs.published == 'true'
        id: packagemaze-release
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          node <<'NODE'
          const packages = JSON.parse(process.env.PUBLISHED_PACKAGES || "[]");
          const publish = packages.some((pkg) => pkg.name === "openapi-typescript");
          require("node:fs").appendFileSync(process.env.GITHUB_OUTPUT, `publish=${publish}\n`);
          NODE

      - name: Set up PackageMaze CLI
        if: steps.packagemaze-release.outputs.publish == 'true'
        uses: packagemaze/setup-maze@v0.0.1

      - name: Pack openapi-typescript for PackageMaze
        if: steps.packagemaze-release.outputs.publish == 'true'
        id: packagemaze-pack
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/packagemaze-npm"
          package_version="$(node -p 'require("./packages/openapi-typescript/package.json").version')"
          tarball="$RUNNER_TEMP/packagemaze-npm/openapi-typescript-${package_version}.tgz"
          (
            cd packages/openapi-typescript
            corepack pnpm pack --out "$tarball"
          )
          echo "package-version=$package_version" >> "$GITHUB_OUTPUT"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Attest PackageMaze package
        if: steps.packagemaze-release.outputs.publish == 'true'
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: ${{ steps.packagemaze-pack.outputs.tarball }}

      - name: Configure PackageMaze npm registry
        if: steps.packagemaze-release.outputs.publish == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: latest
          registry-url: ${{ env.PACKAGE_MAZE_REGISTRY_URL }}/

      - name: Set up my CI to publish to PackageMaze
        if: steps.packagemaze-release.outputs.publish == 'true'
        id: packagemaze-publish-token
        run: maze auth exchange-oidc --feed "$PACKAGE_MAZE_FEED" --purpose publish --package openapi-typescript --format github-output

      - name: Publish openapi-typescript to PackageMaze
        if: steps.packagemaze-release.outputs.publish == 'true'
        run: corepack pnpm publish "${{ steps.packagemaze-pack.outputs.tarball }}" --access public --no-git-checks --registry "$PACKAGE_MAZE_REGISTRY_URL/"
        env:
          NODE_AUTH_TOKEN: ${{ steps.packagemaze-publish-token.outputs.token }}

      - name: Set up my CI to install from PackageMaze
        if: steps.packagemaze-release.outputs.publish == 'true'
        id: packagemaze-install-token
        run: maze auth exchange-oidc --feed "$PACKAGE_MAZE_FEED" --purpose install --format github-output

      - name: Install published openapi-typescript from PackageMaze
        if: steps.packagemaze-release.outputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ steps.packagemaze-install-token.outputs.token }}
          PACKAGE_VERSION: ${{ steps.packagemaze-pack.outputs.package-version }}
        run: |
          rm -rf "$RUNNER_TEMP/packagemaze-readback"
          mkdir -p "$RUNNER_TEMP/packagemaze-readback"
          cd "$RUNNER_TEMP/packagemaze-readback"
          {
            printf 'registry=%s/\n' "$PACKAGE_MAZE_REGISTRY_URL"
            printf '//pkg.packagemaze.com/packagemaze/npm-smoke-test/:_authToken=${NODE_AUTH_TOKEN}\n'
            printf 'always-auth=true\n'
          } > .npmrc
          npm init -y
          npm install "openapi-typescript@$PACKAGE_VERSION" --ignore-scripts --no-audit --fund=false
          node --input-type=module -e 'const mod = await import("openapi-typescript"); if (typeof mod.default !== "function") throw new Error("PackageMaze readback import failed");'
